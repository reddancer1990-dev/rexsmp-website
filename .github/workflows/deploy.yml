name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Copy built files to repo root (legacy GitHub Pages)
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/sw.js dist/registerSW.js dist/manifest.webmanifest ./
          cp dist/workbox-*.js ./
          cp public/favicon.svg public/apple-touch-icon.svg ./
          cp public/.nojekyll .nojekyll

      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ sw.js registerSW.js manifest.webmanifest workbox-*.js favicon.svg apple-touch-icon.svg .nojekyll
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Deploy built site [skip ci]"
          git push
